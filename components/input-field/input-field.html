<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>System</title>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css" />

    <!-- Bootstrap 5 CSS CDN -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Google Material Symbols Fonts -->
    <!-- Outlined style -->
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
      rel="stylesheet"
    />
    <!-- Rounded style -->
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded"
      rel="stylesheet"
    />
    <!-- Sharp style -->
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Sharp"
      rel="stylesheet"
    />

    <!-- Google Font: Montserrat (weights 300-700) -->
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="body d-flex justify-content-center p-5">
    <!-- copy this form -->
    <form action="">
      <!-- Email -->
      <div class="input-box pt-4">
        <input type="text" id="email" placeholder=" " required />
        <label for="email">Email</label>
        <span class="material-symbols-outlined input-icon"> person </span>
        <!-- icon dito -->
      </div>

      <!-- Password -->
      <div class="input-box pt-4">
        <input type="password" id="password" placeholder=" " required />
        <label for="email">Password</label>
        <span class="material-symbols-outlined input-icon"> visibility </span>
      </div>
    </form>
    <!-- copy this form -->

    <!-- Bootstrap 5 JS Bundle CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
